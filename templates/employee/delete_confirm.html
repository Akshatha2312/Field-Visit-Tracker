{% extends 'base.html' %}

{% block title %}Delete Employee | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card modern-card">
        <div class="card-body p-4">
            <h1 class="h3 fw-bold text-danger mb-3"><i class="bi bi-trash-fill me-2"></i>Delete Employee</h1>
            <p class="text-muted">Are you sure you want to delete <strong>{{ employee.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash-fill me-2"></i>Delete</button>
                    <a href="{% url 'employee:list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-2"></i>Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .modern-card {
        border: 1px solid #e2e8f0;
        border-radius: 1.1rem;
        box-shadow: 0 12px 30px rgba(15,23,42,0.06);
    }
</style>
{% endblock %}

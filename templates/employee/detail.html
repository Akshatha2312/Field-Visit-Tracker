{% extends 'base.html' %}

{% block title %}Employee Details | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="h3 fw-bold text-primary mb-1"><i class="bi bi-person-lines-fill me-2"></i>Employee Details</h1>
            <p class="text-muted mb-0">View employee profile details.</p>
        </div>
        <a href="{% url 'employee:list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a>
    </div>

    <div class="card modern-card">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Name</label>
                    <div class="form-control">{{ employee.name }}</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <div class="form-control">{{ employee.email }}</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <div class="form-control">{{ employee.phone_number|default:'-' }}</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <div class="form-control">{{ employee.role }}</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .modern-card {
        border: 1px solid #e2e8f0;
        border-radius: 1.1rem;
        box-shadow: 0 12px 30px rgba(15,23,42,0.06);
    }
</style>
{% endblock %}

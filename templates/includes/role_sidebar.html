<div class="card sidebar-card border-0">
    <div class="card-body p-3">
        <div class="fw-bold text-primary mb-3 d-flex align-items-center">
            <span class="icon-badge me-2"><i class="bi bi-layout-sidebar-inset"></i></span>
            {% if is_admin %}Admin Panel{% else %}Employee Panel{% endif %}
        </div>
        <div class="list-group list-group-flush">
            {% if is_admin %}
                <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="{% url 'attendance:management' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                    <i class="bi bi-calendar-check me-2"></i>Attendance Management
                </a>
                <a href="{% url 'visits:list' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                    <i class="bi bi-geo-alt-fill me-2"></i>Visits
                </a>
            {% else %}
                <a href="{% url 'attendance:dashboard' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                    <i class="bi bi-calendar-check me-2"></i>My Attendance
                </a>
                <a href="{% url 'visits:list' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                    <i class="bi bi-geo-alt-fill me-2"></i>My Visits
                </a>
            {% endif %}
            <a href="{% url 'employee:profile' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3">
                <i class="bi bi-person-circle me-2"></i>Profile
            </a>
            <a href="{% url 'logout' %}" class="list-group-item list-group-item-action border-0 px-0 py-2 rounded-3 text-danger">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
            </a>
        </div>
    </div>
</div>

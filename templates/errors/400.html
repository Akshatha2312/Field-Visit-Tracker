{% extends 'base.html' %}

{% block title %}Bad Request | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <h1 class="display-6 fw-bold text-danger">400</h1>
                    <h2 class="h4 fw-bold mb-3">Invalid request</h2>
                    <p class="text-muted mb-4">The request could not be processed because the supplied parameters were invalid.</p>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary">Back to dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

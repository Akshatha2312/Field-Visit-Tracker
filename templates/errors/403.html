{% extends 'base.html' %}

{% block title %}Unauthorized | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card modern-card border-0">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="error-icon mb-3">🔒</div>
                    <h1 class="display-6 fw-bold text-warning">403</h1>
                    <h2 class="h4 fw-bold mb-3">Access denied</h2>
                    <p class="text-muted mb-4">You do not have permission to access this page. Please sign in with the correct account.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Go to login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .modern-card {
        border-radius: 1.2rem;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    .error-icon {
        width: 3.2rem;
        height: 3.2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, #fff8e8 0%, #fffdf7 100%);
        font-size: 1.35rem;
    }
</style>
{% endblock %}

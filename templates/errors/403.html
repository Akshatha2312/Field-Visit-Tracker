{% extends 'base.html' %}

{% block title %}Unauthorized | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <h1 class="display-6 fw-bold text-warning">403</h1>
                    <h2 class="h4 fw-bold mb-3">Access denied</h2>
                    <p class="text-muted mb-4">You do not have permission to access this page. Please sign in with the correct account.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Go to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Delete Visit | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h2 class="h4 fw-bold text-danger mb-3"><i class="bi bi-trash-fill me-2"></i>Delete Visit</h2>
                    <p class="text-muted">Are you sure you want to delete the visit for <strong>{{ visit.client_name }}</strong>?</p>
                    <p class="text-muted small mb-4">This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger btn-loading"><i class="bi bi-trash-fill me-2"></i><span class="btn-text">Delete</span></button>
                            <a href="{% url 'visits:list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

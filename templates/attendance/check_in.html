{% extends 'base.html' %}

{% block title %}Check In | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h2 class="h4 fw-bold text-primary mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>Check In</h2>
                    <p class="text-muted">Record your attendance for today.</p>
                    <form method="post" class="form-loading">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-loading"><i class="bi bi-check2-circle me-2"></i><span class="btn-text">Confirm Check In</span></button>
                            <a href="{% url 'attendance:dashboard' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

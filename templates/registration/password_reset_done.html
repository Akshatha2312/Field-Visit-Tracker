{% extends 'base.html' %}

{% block title %}Password Reset Sent | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <h2 class="fw-bold text-primary mb-3">Check your email</h2>
                    <p class="text-muted">We have sent you an email with instructions to reset your password.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

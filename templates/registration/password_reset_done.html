{% extends 'base.html' %}

{% block title %}Password Reset Sent | Field Visit Tracker{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card modern-card border-0">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="auth-icon mb-3">✅</div>
                    <h2 class="fw-bold text-primary mb-3">Check your email</h2>
                    <p class="text-muted mb-4">We have sent you an email with instructions to reset your password.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .modern-card {
        border-radius: 1.2rem;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    .auth-icon {
        width: 3.2rem;
        height: 3.2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
        font-size: 1.35rem;
    }
</style>
{% endblock %}
